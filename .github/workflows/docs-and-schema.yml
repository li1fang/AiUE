name: docs-and-schema

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Repo surface
        run: python tools/check_repo_surface.py --repo-root .
      - name: Schema contracts
        run: python tools/check_schema_contracts.py --repo-root .

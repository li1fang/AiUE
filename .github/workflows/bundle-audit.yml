name: bundle-audit

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  bundle:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Export bundle
        shell: pwsh
        run: .\export_open_source_bundle.ps1 -OutputRoot .\Saved\ci_bundle -FailOnLeaks

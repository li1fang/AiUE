name: Bug report
description: Report a reproducible AiUE bug.
title: "[Bug] "
labels: ["bug"]
body:
  - type: input
    id: lane
    attributes:
      label: Primary lane
      placeholder: Core / Workflow / Labs / Reliability / Repo Hygiene / Data Contract
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
    validations:
      required: true
  - type: textarea
    id: reports
    attributes:
      label: Relevant reports or paths
